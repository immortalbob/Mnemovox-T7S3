esphome:
  name: MiniSense-T7S3
  friendly_name: MiniSense-T7S3
  platformio_options:
    build_flags:
      - "-Wno-shadow"
      - "-Wno-error=shadow"
  on_boot:
    - priority: -100
      then:
        - delay: 5s
        - wait_until:
            api.connected:
        - delay: 1s
        - micro_wake_word.start:

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_SPEED_80M: "y"
      CONFIG_ESPTOOLPY_FLASHMODE_QIO: "y"

psram:
  mode: octal
  speed: 80MHz

logger:
  hardware_uart: UART0
  level: INFO

api:
  encryption:
    key: "YOUR_BASE64_API_KEY"

ota:
  platform: esphome
  password: "YOUR_OTA_PASSWORD"

wifi:
  ssid: "YOUR_WIFI_SSID"
  password: "YOUR_WIFI_PASSWORD"
  fast_connect: true
  power_save_mode: none
  ap:
    ssid: "t7s3-fallback"
    password: "password123"

captive_portal:

globals:
  - id: va_state
    type: std::string
    restore_value: no
    initial_value: '"idle"'
  - id: responding_timer
    type: int
    restore_value: no
    initial_value: '0'

i2c:
  sda: 18
  scl: 14
  scan: true

i2s_audio:
  - id: i2s_mic
    i2s_lrclk_pin: GPIO15
    i2s_bclk_pin: GPIO16
  - id: i2s_spk
    i2s_lrclk_pin: GPIO5
    i2s_bclk_pin: GPIO10

microphone:
  - platform: i2s_audio
    id: va_mic
    i2s_audio_id: i2s_mic
    i2s_din_pin: GPIO8
    adc_type: external
    pdm: false
    channel: left

speaker:
  - platform: i2s_audio
    id: va_speaker
    i2s_audio_id: i2s_spk
    i2s_dout_pin: GPIO7
    dac_type: external
    i2s_mode: primary
    buffer_duration: 500ms

micro_wake_word:
  vad:
  models:
    - model: github://esphome/micro-wake-word-models/models/v2/hey_jarvis.json@main
  on_wake_word_detected:
    - voice_assistant.start:

voice_assistant:
  id: va
  microphone: va_mic
  speaker: va_speaker
  noise_suppression_level: 1
  auto_gain: 20dBFS
  volume_multiplier: 2.0
  on_start:
    - globals.set:
        id: va_state
        value: '"listening"'
    - component.update: oled
  on_listening:
    - globals.set:
        id: va_state
        value: '"listening"'
    - component.update: oled
  on_stt_end:
    - globals.set:
        id: va_state
        value: '"processing"'
    - component.update: oled
  on_tts_start:
    - globals.set:
        id: va_state
        value: '"responding"'
    - component.update: oled
    - globals.set:
        id: responding_timer
        value: '5'
  on_tts_end:
    - script.execute: hold_responding
  on_end:
    - delay: 50ms
    - micro_wake_word.start:
  on_error:
    - globals.set:
        id: va_state
        value: '"idle"'
    - component.update: oled
    - delay: 2s
    - micro_wake_word.start:

script:
  - id: hold_responding
    mode: restart
    then:
      - delay: 4s
      - globals.set:
          id: va_state
          value: '"idle"'
      - component.update: oled

output:
  - platform: gpio
    pin: GPIO17
    id: board_led
    inverted: false

switch:
  - platform: output
    name: "Board LED"
    output: board_led
    restore_mode: ALWAYS_OFF

sensor:
  - platform: scd4x
    co2:
      name: "Room CO2"
      id: co2
    temperature:
      name: "Room Temperature"
      id: room_temp
    humidity:
      name: "Room Humidity"
      id: room_humidity
  - platform: uptime
    name: "Uptime"
  - platform: wifi_signal
    name: "WiFi RSSI"
    id: wifi_rssi
    update_interval: 60s

binary_sensor:
  - platform: status
    name: "Online"

time:
  - platform: homeassistant
    id: ha_time

font:
  - file: "gfonts://Roboto"
    id: font1
    size: 14
  - file: "gfonts://Roboto"
    id: font_large
    size: 20
  - file: "gfonts://Roboto"
    id: font_small
    size: 10

display:
  - platform: ssd1306_i2c
    id: oled
    model: "SSD1306 128x64"
    address: 0x3C
    offset_x: 0
    offset_y: 0
    rotation: 0°
    lambda: |-
      if (id(va_state) == "listening") {
        it.fill(COLOR_OFF);
        it.printf(64, 24, id(font_large), TextAlign::CENTER, "LISTENING");
      } else if (id(va_state) == "processing") {
        it.fill(COLOR_OFF);
        it.printf(64, 24, id(font_large), TextAlign::CENTER, "PROCESSING");
      } else if (id(va_state) == "responding") {
        it.fill(COLOR_OFF);
        it.printf(64, 24, id(font_large), TextAlign::CENTER, "RESPONDING");
      } else {
        it.strftime(64, 10, id(font1), TextAlign::CENTER, "%I:%M %p", id(ha_time).now());
        it.printf(64, 30, id(font1), TextAlign::CENTER, "Room Temp: %.1fF", id(room_temp).state * 1.8 + 32);
        it.printf(127, 52, id(font_small), TextAlign::RIGHT, "H:%.0f%%  CO2:%4.0fppm", id(room_humidity).state, id(co2).state);
      }
      int rssi = (int)id(wifi_rssi).state;
      int bars = 0;
      if (rssi > -50) bars = 4;
      else if (rssi > -60) bars = 3;
      else if (rssi > -70) bars = 2;
      else if (rssi > -80) bars = 1;
      for (int i = 0; i < 4; i++) {
        int bar_height = (i + 1) * 3;
        int x = 110 + (i * 5);
        int y = 10 - bar_height;
        if (i < bars) {
          it.filled_rectangle(x, y, 4, bar_height);
        } else {
          it.rectangle(x, y, 4, bar_height);
        }
      }
