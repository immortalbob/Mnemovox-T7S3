# ============================================================
# MiniSense-T7S3 — ESPHome Room Sensor Node
# Hardware: LilyGo T7-S3 (ESP32-S3)
# ============================================================
# Components:
#   - SSD1309 2.42" OLED (I2C, 128x64)
#   - SCD40 CO2/Temperature/Humidity sensor (I2C)
#   - INMP441 MEMS microphone (I2S)
#   - MAX98357A Class D amplifier (I2S)
#   - Hey Jarvis wake word (on-device, no cloud)
#   - Voice assistant via Home Assistant
#
# Pin Assignments:
#   3V3  → OLED VDD, SCD40 VDD, INMP441 VDD, MAX98357 SD
#   GND  → OLED GND, SCD40 GND, INMP441 L/R, MAX98357 GND
#   5V   → MAX98357 VIN
#   14   → OLED SCL, SCD40 SCL (I2C bus)
#   18   → OLED SDA, SCD40 SDA (I2C bus)
#   15   → INMP441 WS  (I2S mic bus)
#   16   → INMP441 SCK (I2S mic bus)
#   8    → INMP441 SD
#   5    → MAX98357 LRC  (I2S speaker bus)
#   10   → MAX98357 BCLK (I2S speaker bus)
#   7    → MAX98357 DIN
#   17   → Board LED
#
# Notes:
#   - INMP441 L/R must be tied to GND for left channel selection
#   - MAX98357 SD must be tied to 3V3 to enable the amp
#   - Mic and speaker use separate I2S buses for simultaneous audio
#   - Wake word detection resumes after response finishes (no barge-in)
#   - SCL is on pin 14 (not 17) to free GPIO17 for the board LED
# ============================================================

esphome:
  name: MiniSense-t7s3
  friendly_name: MiniSense-Room-Sensor
  platformio_options:
    build_flags:
      - "-Wno-shadow"
      - "-Wno-error=shadow"
  on_boot:
    - priority: -100
      then:
        - delay: 5s
        - wait_until:
            api.connected:
        - delay: 1s
        - micro_wake_word.start:

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_SPEED_80M: "y"
      CONFIG_ESPTOOLPY_FLASHMODE_QIO: "y"

psram:
  mode: octal
  speed: 80MHz

logger:
  hardware_uart: UART0
  level: INFO

api:
  encryption:
    # Generate with: python -c "import base64, os; print(base64.b64encode(os.urandom(32)).decode())"
    key: "YOUR_BASE64_API_KEY"

ota:
  platform: esphome
  password: "YOUR_OTA_PASSWORD"

wifi:
  ssid: "YOUR_WIFI_SSID"
  password: "YOUR_WIFI_PASSWORD"
  fast_connect: true
  power_save_mode: none
  ap:
    ssid: "t7s3-fallback"
    password: "password123"

captive_portal:

# ============================================================
# THRESHOLDS
# Adjust co2_warning_threshold to suit your environment.
# 1000ppm is the ASHRAE action threshold — above this level
# air quality begins to affect cognitive function noticeably.
# 1500ppm is stuffy/headachy territory. 2000ppm+ is unhealthy.
# The display will flash CO2 HIGH when the threshold is exceeded.
# ============================================================
globals:
  - id: co2_warning_threshold
    type: float
    restore_value: no
    initial_value: '1000'
  - id: va_state
    type: std::string
    restore_value: no
    initial_value: '"idle"'
  - id: responding_timer
    type: int
    restore_value: no
    initial_value: '0'
  - id: flash_state
    type: bool
    restore_value: no
    initial_value: 'false'
  # Phrase indices — picked at state transition, held for duration of state
  - id: listening_phrase
    type: int
    restore_value: no
    initial_value: '0'
  - id: thinking_phrase
    type: int
    restore_value: no
    initial_value: '0'
  - id: responding_phrase
    type: int
    restore_value: no
    initial_value: '0'

# ============================================================
# I2C — OLED + SCD40
# SDA: GPIO18  SCL: GPIO14
# Both devices share this bus (addresses 0x3C and 0x62)
# ============================================================
i2c:
  sda: 18
  scl: 14
  scan: true

# ============================================================
# I2S — Separate buses for mic and speaker
# Mic:     WS=GPIO15  BCLK=GPIO16  SD=GPIO8
# Speaker: LRC=GPIO5  BCLK=GPIO10  DIN=GPIO7
# Separate buses required for simultaneous listen/speak
# ============================================================
i2s_audio:
  - id: i2s_mic
    i2s_lrclk_pin: GPIO15
    i2s_bclk_pin: GPIO16
  - id: i2s_spk
    i2s_lrclk_pin: GPIO5
    i2s_bclk_pin: GPIO10

microphone:
  - platform: i2s_audio
    id: va_mic
    i2s_audio_id: i2s_mic
    i2s_din_pin: GPIO8
    adc_type: external
    pdm: false
    channel: left

speaker:
  - platform: i2s_audio
    id: va_speaker
    i2s_audio_id: i2s_spk
    i2s_dout_pin: GPIO7
    dac_type: external
    i2s_mode: primary
    buffer_duration: 1500ms

# ============================================================
# CO2 WARNING — flashes display at 500ms interval when exceeded
# ============================================================
interval:
  - interval: 500ms
    then:
      - if:
          condition:
            lambda: 'return id(co2).state >= id(co2_warning_threshold);'
          then:
            - lambda: 'id(flash_state) = !id(flash_state);'
            - component.update: oled

# ============================================================
# WAKE WORD
# Uses Hey Jarvis v2 model — more accurate than v1
# VAD runs in parallel to reduce false triggers from
# background noise (TV, music, etc)
# ============================================================
micro_wake_word:
  vad:
  models:
    - model: github://esphome/micro-wake-word-models/models/v2/hey_jarvis.json@main
  on_wake_word_detected:
    - voice_assistant.start:

# ============================================================
# VOICE ASSISTANT
# State machine drives OLED display transitions:
#   idle → listening → thinking → responding → idle
# Phrase index is picked at each state transition and held
# for the duration of that state to prevent flickering.
# auto_gain reduced from 25dBFS — INMP441 is a hot mic,
# higher values risk saturating the wake word model input.
# ============================================================
voice_assistant:
  id: va
  microphone: va_mic
  speaker: va_speaker
  noise_suppression_level: 1
  auto_gain: 20dBFS
  volume_multiplier: 1.0
  on_start:
    - lambda: |-
        id(va_state) = "listening";
        id(listening_phrase) = random() % 20;
    - component.update: oled
  on_listening:
    - component.update: oled
  on_stt_end:
    - lambda: |-
        id(va_state) = "thinking";
        id(thinking_phrase) = random() % 20;
    - component.update: oled
  on_tts_start:
    - lambda: |-
        id(va_state) = "responding";
        id(responding_phrase) = random() % 20;
    - component.update: oled
    - globals.set:
        id: responding_timer
        value: '5'
  on_tts_end:
    - script.execute: hold_responding
  on_end:
    - delay: 50ms
    - micro_wake_word.start:
  on_error:
    - globals.set:
        id: va_state
        value: '"idle"'
    - component.update: oled
    - delay: 2s
    - micro_wake_word.start:

# Holds RESPONDING on screen for 4 seconds after TTS ends
# prevents the display from flashing back to idle too quickly
script:
  - id: hold_responding
    mode: restart
    then:
      - delay: 4s
      - globals.set:
          id: va_state
          value: '"idle"'
      - component.update: oled

# ============================================================
# BOARD LED (GPIO17)
# Controllable from Home Assistant, boots off
# ============================================================
output:
  - platform: gpio
    pin: GPIO17
    id: board_led
    inverted: false

switch:
  - platform: output
    name: "Board LED"
    output: board_led
    restore_mode: ALWAYS_OFF

# ============================================================
# SENSORS
# SCD40 reports to Home Assistant every ~5 seconds (default)
# Allow 3 minutes after boot for first CO2 measurement
# ============================================================
sensor:
  - platform: scd4x
    co2:
      name: "Room CO2"
      id: co2
    temperature:
      name: "Room Temperature"
      id: room_temp
    humidity:
      name: "Room Humidity"
      id: room_humidity
  - platform: uptime
    name: "Uptime"
    id: uptime_sensor
  - platform: wifi_signal
    name: "WiFi RSSI"
    id: wifi_rssi
    update_interval: 60s

binary_sensor:
  - platform: status
    name: "Online"

time:
  - platform: homeassistant
    id: ha_time

# ============================================================
# FONTS
# font1      — 14px, main display text
# font_large — 20px, voice state transitions
# font_small — 10px, humidity and CO2 bottom line
# ============================================================
font:
  - file: "gfonts://Roboto"
    id: font1
    size: 14
  - file: "gfonts://Roboto"
    id: font_large
    size: 20
  - file: "gfonts://Roboto"
    id: font_small
    size: 10

# ============================================================
# DISPLAY — SSD1309 2.42" 128x64 I2C
#
# Priority order:
#   1. Voice state (listening / thinking / responding)
#   2. CO2 warning (flashing if threshold exceeded)
#   3. Idle readout (time, temp, humidity/CO2, wifi bars)
#
# Each voice state picks a random phrase from 20 options
# at transition time, held for the duration of the state.
# ============================================================
display:
  - platform: ssd1306_i2c
    id: oled
    model: "SSD1306 128x64"
    address: 0x3C
    offset_x: 0
    offset_y: 0
    rotation: 0°
    lambda: |-
      if (id(va_state) == "listening") {
        it.fill(COLOR_OFF);
        const char* listening[] = {
          "YEAH?",
          "GO AHEAD",
          "WHAT'S UP?",
          "SPEAK UP",
          "I'M ALL EARS",
          "ONLINE",
          "LISTENING",
          "AWAITING",
          "YES?",
          "TELL ME",
          "STANDBY",
          "ENGAGED",
          "RECEIVING",
          "GO ON",
          "I'M HERE",
          "INPUT?",
          "HEY?",
          "TUNED IN",
          "UGH, WHAT?",
          "ACTIVE"
        };
        it.printf(64, 24, id(font_large), TextAlign::CENTER, listening[id(listening_phrase)]);
      } else if (id(va_state) == "thinking") {
        it.fill(COLOR_OFF);
        const char* thinking[] = {
          "THINKING...",
          "PROCESSING",
          "ONE SEC",
          "WORKING",
          "CHECKING",
          "SEARCHING",
          "FETCHING",
          "ANALYZING",
          "COMPUTING",
          "ON IT",
          "STAND BY",
          "CALCULATING",
          "LOOKING",
          "QUERYING",
          "HOLD ON",
          "ALMOST...",
          "HMMM...",
          "CRUNCHING",
          "REASONING",
          "PARSING"
        };
        it.printf(64, 24, id(font_large), TextAlign::CENTER, thinking[id(thinking_phrase)]);
      } else if (id(va_state) == "responding") {
        it.fill(COLOR_OFF);
        const char* responding[] = {
          "RESPONDING",
          "FOUND IT",
          "HERE YA GO",
          "HERE IT IS",
          "LISTEN UP",
          "ROGER",
          "TRANSMIT",
          "OUTPUT",
          "SPEAKING",
          "DELIVERING",
          "GOT IT",
          "DONE",
          "THERE IT IS",
          "THAT'S IT",
          "REPLYING",
          "ALL SET",
          "NO PROBLEM",
          "YOU BET",
          "ENJOY",
          "ON THE AIR"
        };
        it.printf(64, 24, id(font_large), TextAlign::CENTER, responding[id(responding_phrase)]);
      } else if (id(co2).state >= id(co2_warning_threshold)) {
        if (id(flash_state)) {
          it.fill(COLOR_ON);
          it.printf(64, 24, id(font_large), TextAlign::CENTER, "CO2 HIGH");
        } else {
          it.fill(COLOR_OFF);
          it.printf(64, 24, id(font_large), TextAlign::CENTER, "CO2 HIGH");
        }
      } else {
        auto now = id(ha_time).now();
        if (now.is_valid()) {
          it.strftime(64, 10, id(font1), TextAlign::CENTER, "%I:%M %p", now);
        } else {
          it.printf(64, 10, id(font1), TextAlign::CENTER, "--:-- --");
        }
        it.printf(64, 30, id(font1), TextAlign::CENTER, "Room Temp: %.1fF", id(room_temp).state * 1.8 + 32);
        it.printf(127, 52, id(font_small), TextAlign::RIGHT, "H:%.0f%%  CO2:%4.0fppm", id(room_humidity).state, id(co2).state);
      }
      // WiFi signal bars — top right corner
      int rssi = (int)id(wifi_rssi).state;
      int bars = 0;
      if (rssi > -50) bars = 4;
      else if (rssi > -60) bars = 3;
      else if (rssi > -70) bars = 2;
      else if (rssi > -80) bars = 1;
      for (int i = 0; i < 4; i++) {
        int bar_height = (i + 1) * 3;
        int x = 110 + (i * 5);
        int y = 10 - bar_height;
        if (i < bars) {
          it.filled_rectangle(x, y, 4, bar_height);
        } else {
          it.rectangle(x, y, 4, bar_height);
        }
      }
